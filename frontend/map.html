<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorperCompass - Interactive Map</title>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; margin-top: 20px; border-radius: 8px; }
        .controls { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-box select, .search-box input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search-box button { padding: 8px 16px; }
    </style>
</head>
<body>
    <nav></nav>
    <main>
        <h1>Interactive Map</h1>
        <div class="controls">
            <div class="search-box">
                <select id="state-select">
                    <option value="">Select State</option>
                    <!-- Populate with Nigerian states via JS -->
                </select>
                <select id="lga-select" disabled>
                    <option value="">Select LGA</option>
                </select>
                <button id="zoom-to-location" class="btn">Zoom to Location</button>
            </div>
            <button id="show-markers" class="btn">Show Markers</button>
            <button id="show-heatmap" class="btn">Show Heatmap</button>
            <button id="clear-overlay" class="btn">Clear Overlays</button>
        </div>
        <div id="map"></div>
    </main>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
